---
caveblock:
  sign:
    line0: "<red>CaveBlock"
    line1: "¡Bienvenido!"
    line2: "[name]"
    line3: "¡Cava! <red><3"
  informational:
    to-nether: Tan desafortunado en caer al infierno.
    to-the-end: Haz alcanzado el fin.
    to-normal: Volver a tu cueva.
  general:
    errors:
      no-island: "<red>¡No tienes una cueva!"
      player-has-island: "<red>¡Ese jugador ya tiene una cueva!"
      player-has-no-island: "<red>¡Ese jugador no tiene una cueva!"
      already-have-island: "<red>¡Ya tienes una cueva!"
      no-safe-location-found: "<red>No encontramos un lugar seguro para teletransportarte
        a la cueva."
      not-owner: "<red>¡No eres el propietario de la cueva!"
  commands:
    admin:
      team:
        add:
          name-has-island: "<red>[name] tiene una cueva. ¡Deshazte de ella primero!"
          success: "<aqua>[name]<green> ha sido agregado a la cueva de <aqua>[owner]<green>."
        kick:
          success: "<aqua>[name] <green>ha sido expulsado de la cueva de <aqua>[owner]<green>."
        setowner:
          description: transfiere la propiedad de la cueva al jugador
          already-owner: "<red>¡[name] ya es el propietario de esta cueva!"
          success: "<aqua>[name]<green> es ahora el propietario de esta cueva."
      range:
        description: Comando de cuevas para administradores
        display:
          description: muestra/oculta los indicadores del rango de la cueva
          hint: |-
            <white>Los <red>iconos de barrera roja <white>muestran el límite de protección de la cueva.
            <white>Las <gray>partículas grises <white>muestran el limite máximo de la cueva.
            <white>Las <green>particulas verdes <white>muestran el rango predeterminado de protección si el actual es diferente.
        set:
          description: establece el rango de protección de la cueva
          success: "<green>Haz establecido el rango de protección de la cueva a <aqua>[number]<green>."
        reset:
          description: restablece el rango de protección de la cueva al predeterminado
            del mundo
          success: "<green>Haz restablecido el rango de protección de la cueva a <aqua>[number]<green>."
      register:
        description: registra a un jugador a la cueva sin propietario en la que estás
        registered-island: "<green>Jugador registrado en la cueva de [xyz]."
        already-owned: "<red>¡Esta cueva ya tiene propietario!"
        no-island-here: "<red>No hay una cueva aquí. Confirmar para crear una."
        in-deletion: "<red>Esta cueva se está eliminando actualmente. Intenta más tarde."
        cannot-make-island: "<red> No se puede colocar una cueva aquí, lo sentimos. Revisa
          la consola para posibles errores."
      unregister:
        description: elimina el propietario de la cueva, pero mantiene los bloques
        unregistered-island: "<green>Eliminado el jugador de la cueva de [xyz]."
      info:
        description: obtener info. sobre donde estás o de la cueva
        no-island: "<red>No estás en una cueva ahora mismo..."
        title: "======== Info. de la cueva =========="
        islands-in-trash: "<light_purple>El jugador tiene cuevas en la basura."
        is-spawn: La isla es una cueva de spawneo
      switchto:
        description: cambia la cueva del jugador a la numerada de la basura
        out-of-range: "<red>El número debe estar entre 1 y [number]. Usa <bold>[label] trash
          [player] <reset><red>para ver el número de la cueva."
      trash:
        no-unowned-in-trash: "<red>No hay cuevas sin propietario en la basura."
        no-islands-in-trash: "<red>El jugador no tiene cuevas en la basura"
        description: muestra cuevas sin propietario o las cuevas del jugador en la
          basura
        title: "<light_purple>========== Cuevas en la basura =========="
        count: "<bold><light_purple>Cueva [number]:"
        use-switch: "<green>Usa <bold>[label] switch <jugador> <número><reset><green> para cambiar la
          cueva del jugador a una de la basura."
      emptytrash:
        description: Limpiar la basura del jugador, o todas las cuevas sin propietario
          en la basura
      setrange:
        description: establece el rango de la cueva del jugador
        range-updated: Rango de cueva actualizado a [number]
      tp:
        description: teletransportarse a una cueva
      getrank:
        description: ver el rango de un jugador en su cueva
        rank-is: "<green>El rango del jugador es [rank] en su cueva."
      setrank:
        description: establecer el rango del jugador en su cueva
      setspawn:
        description: establecer una cueva como spawn para este mundo
        already-spawn: "<red>¡Esta cueva ya es el spawn!"
        no-island-here: "<red>No hay una cueva aquí."
        confirmation: "<red>¿Estás seguro que quieres establecer esta cueva como spawn
          de este mundo?"
      resetflags:
        description: Restablecer todas las cuevas a los ajustes predeterminados en
          config.yml
      delete:
        description: eliminar la cueva de un jugador
        cannot-delete-owner: "<red>Todos los miembros de la cueva deben ser expulsados
          antes de eliminarla."
        deleted-island: "<green>Cueva de <yellow>[xyz] <green>eliminada correctamente."
    island:
      go:
        description: teletransportar a tu cueva
        teleport: "<green>Teletransportandote a tu cueva."
      help:
        description: El comando principal de las cuevas
      create:
        description: crear una cueva, usando un plano opcional (requiere permiso)
        too-many-islands: "<red>Hay demasiadas cuevas en este mundo: no hay suficiente
          espacio para crear una para ti."
        unable-create-island: "<red>Tu cueva no pudo ser generada, por favor contacta
          a un administrador."
        creating-island: "<green>Creando tu cueva, por favor espera un momento..."
        pick: "<green>Elige una cueva"
      info:
        description: muestra info. de tu/otra cueva
      near:
        description: muestra el nombre de las cuevas vecinas
        the-following-islands: "<green>Las cuevas cercanas son:"
        no-neighbors: "<red>¡No hay cuevas vecinas!"
      reset:
        description: reinicia tu cueva y elimina la anterior
        must-remove-members: "<red>Debes eliminar a todos los miembros de tu cueva antes
          de poder reiniciarla (/island team kick <jugador>)."
      sethome:
        must-be-on-your-island: "<red>¡Debes estar en tu cueva para establecer el hogar!"
        home-set: "<gold>El hogar de tu cueva ha sido establecido a tu posición actual."
      setname:
        description: establece un nombre a tu cueva
      resetname:
        description: reinicia el nombre de tu cueva
      team:
        coop:
          description: dar rango coop. a un jugador en tu cueva
        uncoop:
          you-are-no-longer-a-coop-member: "<red>Ya no eres un miembro coop en la cueva
            de [name]"
          all-members-logged-off: "<red>Todos los miembros de la cueva de [name] se desconectaron
            así que ya no eres un miembro coop."
        trust:
          description: dar rango aliado a un jugador en tu cueva
        invite:
          description: invita a un jugador a tu cueva
          name-has-invited-you: "<green>[name] te ha invitado a su cueva."
          you-will-lose-your-island: "<red>¡ADVERTENCIA! ¡Perderás tu cueva si aceptas!"
          errors:
            island-is-full: "<red>Tu cueva está llena, no puedes invitar a nadie más."
          accept:
            you-joined-island: "<green>¡Te uniste a una cueva! Usa /[label] team info para
              ver a los otros miembros."
            name-joined-your-island: "<green>¡[name] se unió a tu cueva!"
            confirmation: |-
              <red>¿Estás seguro que quieres aceptar la invitación?
              <red><bold>¡<underlined>PERDERAS<red><bold> tu cueva actual!
          reject:
            you-rejected-invite: "<green>Haz rechazado la invitación."
            name-rejected-your-invite: "<red>¡[name] rechazo la invitación!"
          cancel:
            description: cancela invitaciones pendientes para unirse a tu cueva
        leave:
          description: salir de tu cueva
          left-your-island: "<red>[name] <red>salió de la cueva"
        kick:
          description: elimina un miembro de tu cueva
          owner-kicked: "<red>¡El propietario te ha expulsado de la cueva!"
          success: "<aqua>[name] <green>ha sido expulsado de tu cueva."
        demote:
          description: desciende un rango a un jugador de tu cueva
        promote:
          description: asciende un rango a un jugador de tu cueva
        setowner:
          description: transfiere la propiedad de tu cueva a otro jugador
          errors:
            target-is-not-member: "<red>¡Este jugador no pertenece a tu cueva!"
          name-is-the-owner: "<green>¡[name] ahora es el propietario de la cueva!"
          you-are-the-owner: "<green>¡No eres el propietario de la cueva!"
      ban:
        description: banear un jugador de tu cueva
        cannot-ban-more-players: "<red>Haz alcanzado el limite de baneos, no puedes banear
          más jugadores de tu cueva."
        player-banned: "<aqua>[name]<red> ahora está baneado de tu cueva."
        owner-banned-you: "<red>¡<aqua>[name]<red> te ha baneado de su cueva!"
        you-are-banned: "<aqua>¡Estás baneado de esta cueva!"
      unban:
        description: desbanear un jugador de tu cueva
        player-unbanned: "<aqua>[name]<green> ha sido desbaneado de tu cueva."
        you-are-unbanned: "<green>¡<aqua>[name]<green> te ha desbaneado de su cueva!"
      banlist:
        noone: "<green>Nadie está baneado en esta cueva."
      settings:
        description: muestra los ajustes de la cueva
      expel:
        description: expulsa a un jugador de tu cueva
        not-on-island: "<red>¡Ese jugador no está en tu cueva!"
        player-expelled-you: "<red>¡<aqua>[name]<red> te expulsó de la cueva!"
  ranks:
    owner: Rey enano
    sub-owner: Caballero enano
    member: Enano
    trusted: Aliado
    coop: Coop
    visitor: Humano
    banned: Orco
  protection:
    flags:
      ENDERMAN_GRIEFING:
        description: |-
          <green>Los Endermans pueden quitar
          <green>bloques de las cuevas
        name: Grifeo de Endermans
      ENTER_EXIT_MESSAGES:
        island: Cueva de [name]
      GEO_LIMIT_MOBS:
        description: |-
          <green>Eliminar las criaturas que salgan
          <green>del espacio protegido de la cueva
        name: "<yellow>Limitar criaturas a la cueva"
      ISLAND_RESPAWN:
        description: |-
          <green>Los jugadores reaparecen
          <green>en sus cuevas
        name: Reaparición en cuevas
      LIQUIDS_FLOWING_OUT:
        name: Flujo de líquidos por fuera
        description: |-
          <green>Alternar si los líquidos pueden fluir por
          <green>fuera del rango de protección de la cueva.
      LOCK:
        description: Alternar bloqueo
        name: Bloquear cueva
      NATURAL_SPAWNING_OUTSIDE_RANGE:
        name: Aparición natural de criaturas por fuera
        description: |-
          <green>Alternar si las criaturas (animales y
          <green>monstruos) pueden aparecer naturalmente por fuera
          <green>del rango de protección de la cueva.

          <red>Ten en cuenta que esto no previene la aparición
          <red>de criaturas mediante un spawner o huevo.
      OFFLINE_GROWTH:
        description: |-
          <green>Al desactivarse, las plantas no
          <green>crecerán en cuevas con todos
          <green>sus miembros desconectados.
          <green>Puede ayudar a reducir el lag.
        name: Crecimiento fuera de línea
      OFFLINE_REDSTONE:
        description: |-
          <green>Al desactivarse, la redstone no
          <green>funcionará en cuevas con todos
          <green>sus miembros desconectados.
          <green>Puede ayudar a reducir el lag.
        name: Redstone fuera de línea
      PISTON_PUSH:
        description: |-
          <green>Permitir que los pistones empujen
          <green>bloques fuera de la cueva
        name: Empuje de pistones
      REMOVE_MOBS:
        description: |-
          <green>Eliminar monstruos cuando te
          <green>teletransportas a la cueva
        name: Eliminar monstruos
      TREES_GROWING_OUTSIDE_RANGE:
        name: Crecimiento de arboles por fuera
        description: |-
          <green>Alternar si los arboles pueden crecer por fuera
          <green>del rango de protección de la cueva o no.
      PREVENT_TELEPORT_WHEN_FALLING:
        name: Evitar el teletransporte al caer
        description: |-
          <green>Evitar que los jugadores se teletransporten
          <green>a sus cuevas usando comandos
          <green>mientras están cayendo.
        hint: "<red>No puedes teletransportarte a tu cueva mientras estás cayendo."
    locked: "<red>¡Esta cueva está bloqueada!"
    protected: "<red>Cueva protegida: [description]"
    spawn-protected: "<red>Spawn protegido: [description]"
    panel:
      PROTECTION:
        description: |-
          <green>Ajustes de protección
          <green>para esta cueva
      SETTING:
        description: |-
          <green>Ajustes generales
          <green>para esta cueva
protection:
  flags:
    SKY_WALKER_FLAG:
      description: |-
        <dark_purple><italic>Esto permite activar/desactivar
        <dark_purple><italic>la habilidad para caminar en el
        <dark_purple><italic>techo del mundo de cuevas
        <dark_purple><italic>sin permisos extra.
      name: Caminante aéreo
      hint: Permite caminar en el techo de la cueva
