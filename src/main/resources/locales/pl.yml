---
caveblock:
  sign:
    line0: "<red>CaveBlock"
    line1: Witaj!
    line2: "[name]"
    line3: Zacznij kopać! <red><3
  informational:
    to-nether: Uuu... Pech, wpadłes do Netheru.
    to-the-end: To już jest koniec.
    to-normal: Powrót do jaskini.
  general:
    errors:
      no-island: "<red>Nie masz jaskini!"
      player-has-island: "<red>Gracz już posiada jaskinie!"
      player-has-no-island: "<red>Ten gracz nie posiada jaskini!"
      already-have-island: "<red>Już masz jaskinie!"
      no-safe-location-found: "<red>Nie można znaleźć bezpiecznego miejsca dla teleportu
        do jaskini."
      not-owner: "<red>To nie twoja jaskinia!"
  commands:
    admin:
      team:
        add:
          name-has-island: "<red>[name] posiada jaskinie. Pierw wyrejestruj lub usuń!"
          success: "<aqua>[name]<green> został dodany do jaskini gracza <aqua>[owner]."
        kick:
          success: "<aqua>[name] <green>został wyrzucony z jaskini gracza <aqua>[owner]."
        setowner:
          description: przenosi własności jaskini do gracza
          already-owner: "<red>[name] jest już właścicielem tej jaskini!"
          success: "<aqua>[name]<green> jest teraz właścicielem tej jaskini."
      range:
        description: Zasięg komendy Jaskinii Admina
        display:
          description: pokaż/ukryj wskaźniki zasięgu jaskiń
          hint: |-
            <red>Czerwone ikony bariery <white>pokazują aktualny limit zasięgu chronionego jaskini.
            <gray>Szare cząsteczki <white>pokazują maksymalny limit jaskini.
            <green>Zielone cząsteczki <white>pokazują domyślny zasięg ochrony, jeśli zasięg ochrony jaskini różni się od niego.
        set:
          description: ustawia zasięg ochrony jaskini
          success: "<green>Ustaw zasięg ochrony jaskini na <aqua>[number]<green>."
        reset:
          description: resetuje zasięg chroniony jaskini do wartości domyślnych świata
          success: "<green>Zresetuj zasięg ochrony jaskini na <aqua>[number]<green>."
      register:
        description: zarejestruj gracza w niezarejestrowanej jaskini, w której się
          znajdujesz
        registered-island: "<green>Zarejestrowano gracza do jaskini w [xyz]."
        already-owned: "<red>Jaskinia jest już własnością innego gracza!"
        no-island-here: "<red>Tutaj nie ma jaskini. Potwierdź, aby utworzyć."
        in-deletion: "<red>To miejsce jaskini jest obecnie usuwane. Spróbuj później."
        cannot-make-island: "<red>Przepraszamy, nie można tu umieścić jaskini. Zobacz
          konsolę, aby poznać możliwe błędy."
      unregister:
        description: wyrejestruj właściciela z jaskini, ale zachowaj bloki jaskiniowe
        unregistered-island: "<green>Niezarejestrowany gracz z jaskini w [xyz]."
      info:
        description: uzyskaj informacje o tym, gdzie jesteś lub o jaskini gracza
        no-island: "<red>Nie jesteś teraz w jaskini ..."
        title: "======== Informacje o jaskini ========"
        islands-in-trash: "<light_purple>Gracz ma jaskinie w koszu."
        is-spawn: Wyspa jest jaskinią spawnu
      switchto:
        description: zmień jaskinię gracza na ponumerowaną znajdującą się w koszu
        out-of-range: "<red>Numer musi mieścić się w przedziale od 1 do [number]. Użyj
          <bold>[label] trash [player], <reset><red>aby zobaczyć numery jaskiń"
      trash:
        no-unowned-in-trash: "<red>Żadnych bezpańskich jaskiń w śmieciach"
        no-islands-in-trash: "<red>Gracz nie ma jaskiń w koszu"
        description: pokaż bezpańskie jaskinie lub jaskinie graczy w śmieciach
        title: "<light_purple>=========== Jaskinie w koszu ==========="
        count: "<bold><light_purple>Jaskinia [number]:"
        use-switch: "<green>Użyj <bold>[label] switchto <player> <number><reset><green> aby przełączyć
          gracza do jaskini w koszu"
      emptytrash:
        description: Usuń śmieci dla gracza lub wszystkie bezpańskie jaskinie w koszu
      setrange:
        description: ustaw zasięg jaskini gracza
        range-updated: Zasięg jaskiń został zaktualizowany do [number]
      tp:
        description: teleportuj się do jaskini gracza
      getrank:
        description: zdobądź rangę gracza w swojej jaskini
        rank-is: "<green>Rank to [rank] w ich jaskini."
      setrank:
        description: ustaw rangę gracza w jego jaskini
      setspawn:
        description: ustaw jaskinię jako spawn dla tego świata
        already-spawn: "<red>Ta jaskinia już się odradza!"
        no-island-here: "<red>Nie ma tu jaskini."
        confirmation: "<red>Czy na pewno chcesz ustawić tę jaskinię jako miejsce odrodzenia
          tego świata?"
      resetflags:
        description: Zresetuj wszystkie jaskinie do domyślnych ustawień flag w config.yml
      delete:
        description: usuwa jaskinię gracza
        cannot-delete-owner: "<red>Wszyscy członkowie jaskini muszą zostać wyrzuceni
          z jaskini przed jej usunięciem."
        deleted-island: "<green>Wyspa w <yellow>[xyz] <green>została pomyślnie usunięta."
    island:
      go:
        description: teleportować cię do swojej jaskini
        teleport: "<green>Teleportuję Cię do Twojej jaskini."
      help:
        description: Główne dowództwo jaskini
      create:
        description: stwórz jaskinię, korzystając z opcjonalnego planu (wymaga pozwolenia)
        too-many-islands: "<red>Na tym świecie jest zbyt wiele jaskiń: nie ma wystarczająco
          dużo miejsca, aby stworzyć twoją."
        unable-create-island: "<red>Twoja jaskinia nie może zostać wygenerowana, skontaktuj
          się z administratorem."
        creating-island: "<green>Tworzenie jaskini, proszę chwilę poczekać..."
        pick: "<green>Wybierz jaskinię"
      info:
        description: wyświetlaj informacje o swojej jaskini lub jaskini gracza
      near:
        description: pokaż nazwy sąsiednich jaskiń wokół ciebie
        the-following-islands: "<green>W pobliżu znajdują się następujące jaskinie:"
        no-neighbors: "<red>Nie masz bezpośrednio sąsiadujących jaskiń!"
      reset:
        description: uruchom ponownie jaskinię i usuń starą
        must-remove-members: "<red>Musisz usunąć wszystkich członków ze swojej jaskini,
          zanim będziesz mógł ją ponownie uruchomić (/island team kick <gracz>)."
      sethome:
        must-be-on-your-island: "<red>Musisz być w swojej jaskini, aby wrócić do domu!"
        home-set: "<gold>Twój dom w jaskini został ustawiony na bieżącą lokalizację."
      setname:
        description: ustaw nazwę dla swojej jaskini
      resetname:
        description: zresetuj nazwę jaskini
      team:
        coop:
          description: zrób ranking kooperacyjny gracza w swojej jaskini
        uncoop:
          you-are-no-longer-a-coop-member: "<red>Nie jesteś już członkiem współpracy
            w jaskini [name]"
          all-members-logged-off: "<red>Wszyscy członkowie jaskini wylogowali się, więc
            nie jesteś już członkiem kooperacji w jaskini [name]"
        trust:
          description: dać graczowi zaufaną rangę w swojej jaskini
        invite:
          description: zaproś gracza do swojej jaskini
          name-has-invited-you: "<green>[name] zaprasza Cię do swojej jaskini."
          you-will-lose-your-island: "<red>OSTRZEŻENIE! Stracisz swoją jaskinię, jeśli
            się zgodzisz!"
          errors:
            island-is-full: "<red>Twoja jaskinia jest pełna, nie możesz nikogo zaprosić."
          accept:
            you-joined-island: "<green>Dołączyłeś do jaskini! Użyj /[label] info
              o zespole, aby zobaczyć innych członków."
            name-joined-your-island: "<green>[name] dołączył do Twojej jaskini!"
            confirmation: |-
              <red>Czy na pewno chcesz przyjąć to zaproszenie?
              <red><bold>Zgubisz<underlined><reset> <red><bold>yswoją obecną jaskinię!
          reject:
            you-rejected-invite: "<green>Odrzuciłeś zaproszenie do jaskini."
            name-rejected-your-invite: "<red>[name] odrzucił Twoje zaproszenie do jaskini!"
          cancel:
            description: anuluj oczekujące zaproszenie do swojej jaskini
        leave:
          description: opuść swoją jaskinię
          left-your-island: "<red>[name] <red>opuścił twoją jaskinię"
        kick:
          description: usuń członka ze swojej jaskini
          owner-kicked: "<red>Właściciel wykopał cię z jaskini!"
          success: "<aqua>[name] <green>został wyrzucony z Twojej jaskini."
        demote:
          description: zdegraduj gracza w swojej jaskini w dół o rangę
        promote:
          description: awansować gracza w swojej jaskini na wyższą rangę
        setowner:
          description: przenieść własność jaskini na członka
          errors:
            target-is-not-member: "<red>Ten gracz nie jest częścią twojej drużyny jaskiniowej!"
          name-is-the-owner: "<green>[name] jest teraz właścicielem jaskini!"
          you-are-the-owner: "<green>Jesteś teraz właścicielem jaskini!"
      ban:
        description: zbanuj gracza ze swojej jaskini
        cannot-ban-more-players: "<red> Osiągnąłeś limit banów, nie możesz zbanować więcej
          graczy ze swojej jaskini."
        player-banned: "<aqua>[name]<red> jest teraz zablokowany w Twojej jaskini."
        owner-banned-you: "<aqua>[name]<red> zabronił Ci wstępu do swojej jaskini!"
        you-are-banned: "<aqua>Nie masz dostępu do tej jaskini!"
      unban:
        description: odbanuj gracza z twojej jaskini
        player-unbanned: "<aqua>[name]<green> jest teraz odblokowany w Twojej jaskini."
        you-are-unbanned: "<aqua>[name]<green> odblokował cię w swojej jaskini!"
      banlist:
        noone: "<green>Nikt nie jest zabroniony w tej jaskini."
      settings:
        description: wyświetl ustawienia jaskini
      expel:
        description: wyrzuć gracza ze swojej jaskini
        not-on-island: "<red>Tego gracza nie ma w twojej jaskini!"
        player-expelled-you: "<aqua>[name]<red> wyrzucił cię z jaskini!"
  ranks:
    owner: Król krasnoludów
    sub-owner: Krasnoludzki Rycerz
    member: Krasnolud
    trusted: Zaufane
    coop: Kooperacja
    visitor: Człowiek
    banned: Ork
  protection:
    flags:
      ENDERMAN_GRIEFING:
        description: |-
          <green>Endermen może usunąć
          <green>blokady z jaskiń
        name: Rozpacz Endermana
      ENTER_EXIT_MESSAGES:
        island: Jaskinia [name]
      GEO_LIMIT_MOBS:
        description: |-
          <green>Usuń moby, które idą
          <green>poza chronionym
          <green>przestrzeń jaskini
        name: "<yellow>Ogranicz moby do jaskini"
      ISLAND_RESPAWN:
        description: |-
          <green>Gracze odradzają się
          <green>w ich jaskini
        name: Odrodzenie w jaskini
      LIQUIDS_FLOWING_OUT:
        name: Płyny wypływające poza jaskinie
        description: |-
          <green>Przełącz, czy płyny mogą wypływać na zewnątrz
          <green> zasięgu ochrony jaskini.
      LOCK:
        description: Przełącz blokadę
        name: Zablokuj jaskinię
      NATURAL_SPAWNING_OUTSIDE_RANGE:
        name: Naturalne stworzenie odradzające się poza zasięgiem
        description: |-
          <green>Przełącz czy stworzenia (zwierzęta i
          <green>potwory) mogą naturalnie odradzać się na zewnątrz
          <green>zasięg ochrony jaskini.

          <red>Pamiętaj, że nie zapobiega to stworzeniom
          <red>by odradzać się za pomocą generatora mobów lub spawnu
          <red>eg.
      OFFLINE_GROWTH:
        description: |-
          <green>Po wyłączeniu rośliny
          <green>nie będzie rosnąć w jaskiniach
          <green>kiedy wszyscy członkowie są offline.
          <green>Może pomóc zmniejszyć opóźnienia.
        name: Rozwój offline
      OFFLINE_REDSTONE:
        description: |-
          <green>Kiedy wyłączone, czerwony kamień
          <green>nie będzie działać w jaskiniach
          <green>gdzie wszyscy członkowie są offline.
          <green>Może pomóc zmniejszyć opóźnienia.
        name: Offline Redstone
      PISTON_PUSH:
        description: |-
          <green>Zezwalaj tłokom na pchanie
          <green>bloki na zewnątrz jaskini
        name: Popychanie tłoka
      REMOVE_MOBS:
        description: |-
          <green>Usuń potwory, gdy
          <green>teleport do jaskini
        name: Usuń potwory
      TREES_GROWING_OUTSIDE_RANGE:
        name: Drzewa rosnące poza zasięgiem
        description: |-
          <green>Przełącz, czy drzewa mogą rosnąć na zewnątrz i
          <green>zasięg ochrony jaskini, czy nie.
      PREVENT_TELEPORT_WHEN_FALLING:
        name: Zapobiegaj teleportacji podczas upadku
        description: |-
          <green>Zapobiegaj teleportacji graczy
          <green>z powrotem do swojej jaskini za pomocą poleceń
          <green>jeśli spadają.
        hint: "<red>Nie możesz teleportować się z powrotem do swojej jaskini, gdy spadasz."
    locked: "<red>Ta jaskinia jest zamknięta!"
    protected: "<red>Jaskinia chroniona: [description]"
    spawn-protected: "<red>Spawn chroniony: [description]"
    panel:
      PROTECTION:
        description: |-
          <green>Ustawienia ochrony
          <green>dla tej jaskini
      SETTING:
        description: |-
          <green>Ustawienia ogólne
          <green>dla tej jaskini
protection:
  flags:
    SKY_WALKER_FLAG:
      description: |-
        <dark_purple><italic>Pozwala to włączyć/wyłączyć
        <dark_purple><italic>możliwość chodzenia po
        <dark_purple><italic>top świata jaskiń
        <dark_purple><italic>bez dodatkowych uprawnień.
      name: Sky Walker
      hint: Pozwala chodzić po suficie jaskini.
