caveblock:
  prefixes:
    island: hang
    Island: Hang
    Islands: Hang
    an-island: một hang
    islands: hang
  sign:
    line0: "<red>CaveBlock"
    line1: "Chào mừng!"
    line2: "[name]"
    line3: "Đào đi! <red><3"

  informational:
    to-nether: "Rất tệ khi vào địa ngục."
    to-the-end: "Kết thúc rồi."
    to-normal: "Về hang của bạn."
  # Override BentoBox default command strings
  # General strings
  general:
    errors:
      no-island: "<red>Bạn không có hang!"
      player-has-island: "<red>Người chơi đã có hang!"
      player-has-no-island: "<red>Người chơi không có hang!"
      already-have-island: "<red>Bạn đã có hang!"
      no-safe-location-found: "<red>Không thể tìm thấy vị trí an toàn trong hang."
      not-owner: "<red>Bạn không phải chủ hang!"
  commands:
    # Parameters in <> are required, parameters in [] are optional
    admin:
      team:
        add:
          name-has-island: "<red>[name] đã có hang. Huỷ hoặc xoá nó trước!"
          success: "<aqua>[name]<green> đã được thêm vào hang của <aqua>[owner]<green>."
        kick:
           success: "<aqua>[name] <green>đã bị đuổi từ hang của <aqua>[owner]<green>."
        setowner:
          description: "chuyển quyền chủ hang cho người chơi"
          already-owner: "<red>[name] đã là chủ hang!"
          success: "<aqua>[name]<green> giờ là chủ hang."
      range:
        description: "lệnh độ rộng hang của Admin"
        display:
          description: "hiện/ẩn đánh dấu độ rộng hang"
          hint: |-
            <red>Kí tự Rào chặn đỏ <white>thể hiện độ rộng vùng bảo vệ của hang.
            <gray>Hạt Xám <white>thể hiện giới hạn của hang.
            <green>Hạt Xanh <white>thể hiện vùng bảo vệ mặc định nếu vùng bảo vệ của hang khác mặc định.
        set:
          description: "chỉnh vùng bảo vệ hang"
          success: "<green>Đã chỉnh vùng bảo vệ hang thành <aqua>[number]<green>."
        reset:
          description: "chỉnh vùng bảo vệ hang về mặc định"
          success: "<green>Đã chỉnh vùng bảo vệ hang thành <aqua>[number]<green>."
      register:
        description: "đăng kí người chơi vào hang không chủ ở vị trí của bạn"
        registered-island: "<green>Đã đăng kí người chơi ở hang [xyz]."
        already-owned: "<red>Hang đã có chủ!"
        no-island-here: "<red>Không có hang ở đây. Xác nhận để tạo."
        in-deletion: "<red>Hang đang được xoá. Thử lại sau."
        cannot-make-island: "<red> Hang không thể đặt ở đây. Xem lỗi trên bảng điều khiển."
      unregister:
        description: "huỷ quyền chủ hang, nhưng giữ lại các khối trong hang"
        unregistered-island: "<green>Đã huỷ đăng kí người chơi ở hang [xyz]."
      info:
        description: "lấy thông về nơi bạn ở hoặc hang của người chơi"
        no-island: "<red>Bạn không ở một hang..."
        title: "========== Thông tin Hang ============"
        islands-in-trash: "<light_purple>Người chơi có hang trong thùng rác."
        is-spawn: "Đảo là hang triệu hồi"
      switchto:
        description: "chuyển hang của người chơi thành một số trong thùng rác"
        out-of-range: "<red>Số phải từ 1 đến [number]. Dùng <bold>[label] trash [player] <reset><red>để xem số hang"
      trash:
        no-unowned-in-trash: "<red>Không có hang không chủ trong thùng rác"
        no-islands-in-trash: "<red>Người chơi không có hang trong thùng rác"
        description: "xem hang không chủ hoặc của người chơi trong thùng rác"
        title: "<light_purple>=========== Hang trong Thùng Rác ==========="
        count: "<bold><light_purple>Hang [number]:"
        use-switch: "<green>Dùng <bold>[label] switchto <player> <number><reset><green> để chuyển người chơi vào hang trong thùng rác"
      emptytrash:
        description: "Dọn rác cho người chơi, hoặc toàn bộ hang không chủ trong thùng rác"
      setrange:
        description: "chỉnh độ rộng hang của người chơi"
        range-updated: "Đã chỉnh độ rộng của hang thành [number]"
      tp:
        description: "dịch chuyển đến hang của người chơi"
      getrank:
        description: "xem cấp độ của người chơi trong hang"
        rank-is: "<green>Cấp độ là [rank] ở hang của họ."
      setrank:
        description: "chỉnh cấp độ của người chơi ở hang của họ"
      setspawn:
        description: "chỉnh một hang thành nơi bắt đầu ở thế giới này"
        already-spawn: "<red>Hang này đã là nơi bắt đầu!"
        no-island-here: "<red>Không có hang ở đây."
        confirmation: "<red>Bạn có chắc là chọn hang này làm nơi bắt đầu ở thế giới này?"
      resetflags:
        description: "Đặt lại cờ của các hang về mặc định trong config.yml"
      delete:
        description: "xoá hang của người chơi"
        cannot-delete-owner: "<red>Thành viên của hang phải bị đuổi trước khi xoá."
        deleted-island: "<green>Đảo <yellow>[xyz] <green>đã được xoá thành công."
    island:
      go:
        description: "dịch chuyển đến hang của bạn"
        teleport: "<green>Đang dịch chuyển đến hang của bạn."
      help:
        description: "Lệnh hang chính"
      create:
        description: "tạo hang, dùng bản vẽ nếu có (cần quyền)"
        too-many-islands: "<red>Quá nhiều hang ở thế giới này: không đủ khoảng trống cho khu của bạn."
        unable-create-island: "<red>Hang của bạn không được tạo, hãy liên hệ quản trị viên."
        creating-island: "<green>Đang tạo hang, chờ một chút..."
        pick: "<green>Chọn hang"
      info:
        description: "xem thông tin hang của bạn hoặc của người chơi"
      near:
        description: "xem tên của hang kế bên bạn"
        the-following-islands: "<green>Hang kế bên bạn:"
        no-neighbors: "<red>Không có hang kế bên bạn!"
      reset:
        description: "tạo lại hang và xoá hang cũ"
        must-remove-members: "<red>Bạn phải xoá thành viên khỏi hang trước khi xoá (/[label] team kick <player>)."
      sethome:
        must-be-on-your-island: "<red>Bạn phải ở hang của bạn để đặt nhà!"
        home-set: "<gold>Nhà của hang đã đặt ở vị trí của bạn."
      setname:
        description: "đặt tên cho hang"
      resetname:
        description: "đặt lại tên của hang"
      team:
        coop:
          description: "cho người chơi cấp chơi cùng với hang của bạn"
        uncoop:
          you-are-no-longer-a-coop-member: '<red>Bạn không còn chơi cùng với hang của [name].'
          all-members-logged-off: '<red> Người chơi ở hang đã thoát hết nên bạn không còn chơi cùng với hang của [name].'
        trust:
          description: "cho người chơi cấp tin tưởng với hang bạn"
        invite:
          description: "mời người chơi vào hang của bạn"
          name-has-invited-you: "<green>[name] đã mời bạn vào hang của họ."
          you-will-lose-your-island: "<red>CHÚ Ý! Bạn sẽ mất hang của bạn nếu chấp nhận lời mời"
          errors:
            island-is-full: "<red>Hang đã đầy, bạn không thể mời thêm."
          accept:
            you-joined-island: "<green>Bạn đã vào hang! Dùng /[label] team info để xem thành viên khác."
            name-joined-your-island: "<green>[name] đã vào hang của bạn!"
            confirmation: |-
              <red>Bạn có chắc muón chấp nhận lời mời này?
              <red><bold>Bạn sẽ <underlined>MẤT<reset> <red><bold>hang hiện tại của bạn!
          reject:
            you-rejected-invite: "<green>Bạn đã từ chối lời mời vào hang."
            name-rejected-your-invite: "<red>[name] đã từ chối lời mời của bạn!"
          cancel:
            description: "huỷ lời mời đang chờ vào hang của bạn"
        leave:
          description: "rời hang của bạn"
          left-your-island: "<red>[name] <red>đã rời hang của bạn"
        kick:
          description: "xoá thành viên khỏi hang của bạn"
          owner-kicked: "<red>Chủ hang đã đuổi bạn!"
          success: "<aqua>[name] <green>đã bị đuổi khỏi hang của bạn."
        demote:
          description: "hạ cấp của người chơi trong hang"
        promote:
          description: "nâng cấp của người chơi trong hang"
        setowner:
          description: "chuyển quyền chủ hang cho người chơi"
          errors:
            target-is-not-member: "<red>Người chơi đó không ở trong đội của bạn!"
          name-is-the-owner: "<green>[name] giờ là chủ hang!"
          you-are-the-owner: "<green>Bạn giờ là chủ hang!"
      ban:
        description: "cấm người chơi khỏi hang của bạn"
        cannot-ban-more-players: "<red>Đã đạt giới hạn cấm, bạn không thể cấm thêm người."
        player-banned: "<aqua>[name]<red> đã bị cấm khỏi hang của bạn."
        owner-banned-you: "<aqua>[name]<red> đã cấm bạn khỏi hang của họ!"
        you-are-banned: "<aqua>Bạn đã bị cấm ở hang này!"
      unban:
        description: "bỏ cấm người chơi khỏi hang của bạn"
        player-unbanned: "<aqua>[name]<green> không còn bị cấm khỏi hang của bạn."
        you-are-unbanned: "<aqua>[name]<green> huỷ cấm bạn khỏi hang của họ!"
      banlist:
        noone: "<green>Không ai bị cấm ở hang này."
      settings:
        description: "xem tuỳ chọn hang"
      expel:
        description: "trục xuất người chơi khỏi hang của bạn"
        not-on-island: "<red>Người chơi đó không ở hang của bạn!"
        player-expelled-you: "<aqua>[name]<red> đã trục xuất bạn khỏi hang của họ!"

  ranks:
    owner: "Vua Người Lùn"
    sub-owner: "Hiệp Sĩ Người Lùn"
    member: "Người Lùn"
    trusted: "Tin Tưởng"
    coop: "Chơi Cùng"
    visitor: "Con Người"
    banned: "Orc"

  protection:
    flags:
      ENDERMAN_GRIEFING:
        description: |-
          <green>Người Ender có thể cướp
          <green>khối khỏi hang
        name: "Trộm bởi Người Ender"
      ENTER_EXIT_MESSAGES:
        island: "hang của [name]"
      GEO_LIMIT_MOBS:
        description: |-
          <green> Xóa các quái đã rời khỏi
          <green> khu vực bảo vệ trong hang
        name: "<yellow>Giới hạn quái trong đảo"
      ISLAND_RESPAWN:
        description: |-
          <green>Người chơi hồi sinh
          <green>ở hang của họ
        name: "Hồi sinh tại hang"
      LIQUIDS_FLOWING_OUT:
        name: "Chất lỏng tràn ra khỏi hang"
        description: |-
          <green>Bật/Tắt việc chất lỏng có thể
          <green>tràn ra khỏi khu vực bảo vệ của hang.
      LOCK:
        description: "Bật/Tắt khóa"
        name: "Khoá đảo"
      NATURAL_SPAWNING_OUTSIDE_RANGE:
        name: "Sinh quái tự nhiên ngoài hang"
        description: |-
          <green>Bật/Tắt cho phép con vật (động vật và
          <green>quái vật) có thể sinh tự nhiên ngoài
          <green>khu vực bảo vệ của hang.

          <red>Lưu ý là nó không chặn việc sinh quái
          <red>bằng lồng triệu hồi hoặc trứng.
      OFFLINE_GROWTH:
        description: |-
          <green>Khi tắt, cây trồng
          <green>sẽ không mọc lớn trong hang
          <green>nếu tất cả thành viên đều ngoại tuyến.
          <green>Có thể giúp giảm lag.
        name: "Mọc cây khi ngoại tuyến"
      OFFLINE_REDSTONE:
        description: |-
          <green>Khi tắt, đá đỏ
          <green>sẽ không hoạt động trong hang
          <green>nếu tất cả thành viên đều ngoại tuyến.
          <green>Có thể giúp giảm lag.
          <green>Không ảnh hưởng đảo triệu hồi.
        name: "Đá đỏ khi ngoại tuyến"
      PISTON_PUSH:
        description: |-
          <green>Cho phép pít tông đẩy
          <green>khối ra khỏi hang
        name: "Pít tông đẩy khối"
      REMOVE_MOBS:
        description: |-
          <green>Xoá quái khi dịch
          <green>chuyển đến đảo
        name: "Xoá quái"
      TREES_GROWING_OUTSIDE_RANGE:
        name: "Cây mọc ngoài đảo"
        description: |-
          <green>Bật/Tắt việc cây có thể mọc ngoài
          <green>khu vực bảo vệ trong hang.
      PREVENT_TELEPORT_WHEN_FALLING:
        name: "Chặn dịch chuyển khi đang rời"
        description: |-
          <green>Chặn người chơi khỏi việc dịch chuyển
          <green>về đảo của họ bằng lệnh khi đang rơi.
        hint: '<red>Bạn không thể làm điều đó khi đang rơi.'
    locked: "<red>Hang đã bị khoá!"
    protected: "<red>Đã bảo vệ hang: [description]"
    spawn-protected: "<red>Đã bảo vệ nơi bắt đầu: [description]"

    panel:
      PROTECTION:
        description: |-
          <green>Tuỳ chỉnh bảo vệ
          <green>cho hang này
      SETTING:
        description: |-
          <green>Tuỳ chỉnh tổng quan
          <green>cho hang này

protection:
  flags:
    SKY_WALKER_FLAG:
      description: "<dark_purple><italic>Cho phép bật/tắt\n<dark_purple><italic>quyền để đi trên\n<dark_purple><italic>đỉnh của thế giới hang\n<dark_purple><italic>mà không cần thêm quyền."
      name: "Bước Trên Trời Cao"
      hint: "Cho phép đi trên đỉnh hang."