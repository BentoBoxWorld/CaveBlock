    line2: "[name]"
    line3: Fang an zu graben! <red><3
  informational:
    to-nether: Unglücklicherweise in den Nether gefallen.
    to-the-end: Du hast das Ende erreicht.
    to-normal: Zurück zu deiner Höhle.
  general:
    errors:
      no-island: "<red>Du hast keine Höhle!"
      player-has-island: "<red>Spieler hat bereits eine Höhle!"
      player-has-no-island: "<red>Dieser Spieler hat keine Höhle!"
      already-have-island: "<red>Du hast bereits eine Höhle!"
      no-safe-location-found: "<red>Kann keinen sicheren Ort finden, an den du dich in
