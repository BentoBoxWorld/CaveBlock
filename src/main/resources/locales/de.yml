    flags:
      ENDERMAN_GRIEFING:
        description: |-
          <green>Endermen können entfernen
          <green>Blöcke aus Höhlen
        name: Enderman trauert
      ENTER_EXIT_MESSAGES:
        island: "[name] Höhle"
