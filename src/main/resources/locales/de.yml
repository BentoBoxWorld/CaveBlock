        description: |-
          <green>Entferne Mobs, die gehen
          <green>außerhalb des geschützten
          <green>Höhlenraumes
        name: "<yellow>Limit Mobs zur Höhle"
      ISLAND_RESPAWN:
        description: |-
          <green>Spieler respawnen
          <green>in ihrer Höhle
        name: Höhlen-Respawn
      LIQUIDS_FLOWING_OUT:
        name: Flüssigkeiten fließen außerhalb von Höhlen
        description: |-
          <green>Stellen Sie fest, ob Flüssigkeiten nach außen fließen können
          <green>der Schutzreichweite der Höhle.
      LOCK:
        description: Schloss umschalten
        name: Höhle verschließen
      NATURAL_SPAWNING_OUTSIDE_RANGE:
        name: Natürliche Kreatur, die außerhalb der Reichweite laicht
        description: |-
          <green>Toggle ob Kreaturen (Tiere und
          <green>Monster) können natürlich draußen laichen
          <green>im Höhlenschutzbereich.

          <red>Beachten Sie, dass es Kreaturen nicht verhindert
          <red>über einen Mob Spawner oder einen Spawn
          <red>Ei zu spawnen.
      OFFLINE_GROWTH:
        description: |-
          <green>Wenn deaktiviert, Pflanzen
          <green>werden nicht in Höhlen wachsen
          <green>wenn alle Mitglieder offline sind.
          <green>Kann helfen, Verzögerungen zu reduzieren.
        name: Offline-Wachstum
      OFFLINE_REDSTONE:
        description: |-
          <green>Wenn deaktiviert, Redstone
          <green>wird nicht in Höhlen arbeiten
          <green>wo alle Mitglieder offline sind.
          <green>Kann helfen, Verzögerungen zu reduzieren.
        name: Offline Redstone
      PISTON_PUSH:
        description: |-
          <green>Kolben schieben lassen
          <green>Blöcke außerhalb der Höhle
        name: Kolben drücken
      REMOVE_MOBS:
        description: |-
          <green>Entferne Monster, wenn
          <green>du zur Höhle teleportierst
        name: Entferne Monster
      TREES_GROWING_OUTSIDE_RANGE:
        name: Bäume wachsen außerhalb der Reichweite
        description: |-
          <green>Toggle, ob Bäume außerhalb eines wachsen können
          <green>Höhlenschutzbereichs oder nicht.
      PREVENT_TELEPORT_WHEN_FALLING:
        name: Verhindern Sie Teleport beim Fallen
        description: |-
          <green>Vermeide das Teleportieren von Spielern
          <green>mit Befehlen in ihre Höhle
          <green>wenn sie fallen.
        hint: "<red>Sie können sich nicht in Ihre Höhle zurück teleportieren, während
          Sie fallen."
    locked: "<red>Diese Höhle ist verschlossen!"
    protected: "<red>Cave protected: [description]"
    spawn-protected: "<red>Spawn protected: [description]"
    panel:
      PROTECTION:
        description: |-
          <green>Schutzeinstellungen
          <green>für diese Höhle
      SETTING:
        description: |-
          <green>Allgemeine Einstellungen
          <green>für diese Höhle
protection:
  flags:
    SKY_WALKER_FLAG:
      description: |-
        <dark_purple><italic>Dies ermöglicht das Aktivieren / Deaktivieren
        <dark_purple><italic>der Fähigkeit, auf dem
        <dark_purple><italic>Dach der Höhlenwelt
        <dark_purple><italic>ohne zusätzliche Berechtigungen zu gehen.
      name: Sky Walker
      hint: Ermöglicht das Gehen auf der Höhlendecke.
