            name-joined-your-island: "<green>[name] hat sich deiner Höhle angeschlossen!"
            confirmation: |-
              <red>Sind Sie sicher, dass Sie diese Einladung annehmen möchten?
              <red><bold>Sie werden <reset><red><bold>Ihre aktuelle Höhle verlieren!
          reject:
            you-rejected-invite: "<green>Sie lehnten die Einladung ab, sich einer Höhle
              anzuschließen."
            name-rejected-your-invite: "<red>[name] hat deine Höhleneinladung abgelehnt!"
