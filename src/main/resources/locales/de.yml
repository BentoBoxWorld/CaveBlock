          success: "<aqua>[name] <green>wurde zu <aqua>[owner]<green>s Höhle hinzugefügt."
        kick:
          success: "<aqua>[name] <green>wurde aus der Höhle von <aqua>[owner] <green>geworfen."
        setowner:
          description: überträgt den Höhlenbesitz auf den Spieler
          already-owner: "<red>[name] ist bereits der Besitzer dieser Höhle!"
          success: "<aqua>[name] <green>ist jetzt der Besitzer dieser Höhle."
      range:
        description: Admin Cave Range Befehl
        display:
          description: Höhlenreichweite anzeigen/ausblenden
          hint: |-
            <red>Rote Barrier-Symbole <white>zeigen die aktuelle höhlengeschützte Bereichsgrenze an.
            <gray>Graue Partikel <white>zeigen das maximale Höhlenlimit an.
            <green>Grüne Partikel <white>zeigen den standardmäßig geschützten Bereich an, wenn der Höhlenschutzbereich davon abweicht.
        set:
          description: Legt den höhlengeschützten Bereich fest
          success: "<green>Setze den Höhlenschutzbereich auf <aqua>[number]<green>."
        reset:
          description: Setzt den Höhlenschutzbereich auf die  Standardeinstellung
