        creating-island: "<green>Erstellen Sie Ihre Höhle, bitte warten Sie einen Moment..."
        pick: "<green>Wähle eine Höhle aus"
      info:
        description: Zeige Informationen über deine Höhle oder die Höhle des Spielers
