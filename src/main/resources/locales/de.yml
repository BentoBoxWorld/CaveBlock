        player-banned: "<aqua>[name] <red>ist jetzt aus deiner Höhle verbannt."
        owner-banned-you: "<aqua>[name] <red>hat dich aus ihrer Höhle verbannt!"
        you-are-banned: "<aqua>Sie sind aus dieser Höhle verbannt!"
      unban:
        description: Entbinde einen Spieler aus deiner Höhle
        player-unbanned: "<aqua>[name] <green>ist jetzt nicht mehr in deiner Höhle verboten."
        you-are-unbanned: "<aqua>[name] <green>verbannt dich aus ihrer Höhle!"
      banlist:
        noone: "<green>Keine Höhle ist in dieser Höhle verboten."
      settings:
        description: Höhleneinstellungen anzeigen
      expel:
        description: Vertreibe einen Spieler aus deiner Höhle
        not-on-island: "<red>Dieser Spieler ist nicht in deiner Höhle!"
        player-expelled-you: "<aqua>[name] <red>hat dich aus der Höhle vertrieben!"
