            target-is-not-member: "<red>Dieser Spieler ist nicht Teil Ihres Höhlenteams!"
          name-is-the-owner: "<green>[name] ist jetzt der Höhlenbesitzer!"
          you-are-the-owner: "<green>Sie sind jetzt der Höhlenbesitzer!"
      ban:
        description: verbanne einen Spieler aus deiner Höhle
