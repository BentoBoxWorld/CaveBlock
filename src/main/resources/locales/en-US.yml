###########################################################################################
# This is a YML file. Be careful when editing. Check your edits in a YAML checker like    #
# the one at http://yaml-online-parser.appspot.com                                        #
###########################################################################################
# These strings are deltas to the strings in BentoBox. Any BentoBox string can be
# overridden by placing it under the caveblock key. The prefixes below are substituted
# into the default BentoBox strings wherever [prefix_island], [prefix_an-island], etc.
# appear, so most strings do not need to be overridden here.

caveblock:
  prefixes:
    island: cave
    Island: Cave
    Islands: Caves
    an-island: a cave
    islands: caves

  sign:
    line0: "<red>CaveBlock"
    line1: "Welcome!"
    line2: "[name]"
    line3: "Start digging! <red><3"

  informational:
    to-nether: "So unlucky to fall into nether."
    to-the-end: "You have reached the end."
    to-normal: "Back to your cave."

  general:
    errors:
      cave-limit-reached: "<red> You have reached the top of your cave. You cannot get higher!"

  commands:
    admin:
      info:
        no-island: "<red>You are not in a cave right now..."
        # The BentoBox defaults below use the literal word "islands", not a prefix
        islands-in-trash: "<light_purple>Player has caves in trash."
      trash:
        no-unowned-in-trash: "<red>No unowned caves in trash"
        no-islands-in-trash: "<red>Player has no caves in trash"
        description: "show unowned caves or player's caves in trash"
        title: "<light_purple>=========== Caves in Trash ==========="
      emptytrash:
        description: "Clear trash for player, or all unowned caves in trash"
    island:
      team:
        invite:
          accept:
            confirmation: |-
              <red>Are you sure you want to accept this invite?
              <red><bold>You will <underlined>LOSE<reset> <red><bold>your current cave!

  ranks:
    owner: "Dwarf King"
    sub-owner: "Dwarf Knight"
    member: "Dwarf"
    trusted: "Trusted"
    coop: "Coop"
    visitor: "Human"
    banned: "Orc"

  protection:
    flags:
      ISLAND_RESPAWN:
        description: |-
          <green>Players respawn
          <green>in their cave
      OFFLINE_GROWTH:
        description: |-
          <green>When disabled, plants
          <green>will not grow in caves
          <green>where all members are offline.
          <green>May help reduce lag.
      OFFLINE_REDSTONE:
        description: |-
          <green>When disabled, redstone
          <green>will not operate in caves
          <green>where all members are offline.
          <green>May help reduce lag.
          <green>Does not affect the spawn cave.

protection:
  flags:
    SKY_WALKER_FLAG:
      description: "<dark_purple><italic>Enable/disable\n<dark_purple><italic> the ability to walk on\n<dark_purple><italic> the top of the cave world\n<dark_purple><italic> without extra permissions."
      name: "Sky Walker"
      hint: "Allows to walk on the cave roof."
