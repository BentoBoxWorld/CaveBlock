---
caveblock:
  prefixes:
    island: пещера
    Island: Пещера
    Islands: Пещеры
    an-island: пещера
    islands: пещеры
  sign:
    line0: "<red>CaveBlock"
    line1: Добро пожаловать!
    line2: "[name]"
    line3: Начни копать! <red><3
  informational:
    to-nether: Так неудачно впасть в ад.
    to-the-end: Вы достигли конца.
    to-normal: Вернуться к вашей пещере.
  general:
    errors:
      no-island: "<red>У вас нет пещеры!"
      player-has-island: "<red>У этого игрока уже есть пещера!"
      player-has-no-island: "<red>У этого игрока нет пещеры!"
      already-have-island: "<red>У вас уже есть пещера!"
      no-safe-location-found: "<red>Не удалось найти безопасное место для телепортации
        в пещеру."
      not-owner: "<red>Вы не владелец этой пещеры!"
      cave-limit-reached: "<red> Вы достигли вершины своей пещеры. Вы не можете стать
        выше!"
  commands:
    admin:
      team:
        add:
          name-has-island: "<red>[name] имеет пещеру. Сначала отмените регистрацию или
            удалите её!"
          success: "<aqua>[name]<green> был добавлен в пещеру игрока<aqua> [owner]<green>."
        kick:
          success: "<aqua>[name]<green> был выгнан из пещеры <aqua>[owner]<green>."
        setowner:
          description: передать владение  пещеры игроку
          already-owner: "<red>[name] уже является владельцем этой пещеры!"
          success: "<aqua>[name]<green> теперь является владельцем этой пещеры."
      range:
        description: Пещерный диапазон (Админ-команда)
        display:
          description: показать/скрыть индикаторы диапазона пещеры
          hint: |-
            <red>Красные барьеры <white>- показывают текущий предел защищенного пещерного диапазона.
            <gray>Серые Частицы <white>- показывают максимальный предел пещеры.
            <green>Зеленные Частицы <white>- показывают защищенный диапазон по умолчанию, если диапазон защиты пещеры отличается от него.
        set:
          description: устанавливает диапазон защиты пещеры
          success: "<green>Установить диапазон защиты пещеры до <aqua>[number]<green>."
        reset:
          description: сбрасывает защищенный пещерой диапазон в мир по умолчанию
          success: "<green>Сбросить диапазон защиты пещеры до <aqua>[number]<green>."
      register:
        description: зарегистрировать игрока в неизвестной пещере, в которой вы находитесь
        registered-island: "<green>Зарегистрирован игрок в пещере [xyz]."
        already-owned: "<red>Пещера уже принадлежит другому игроку!"
        no-island-here: "<red>И здесь нет пещеры. Подтвердите, чтобы сделать один."
        in-deletion: "<red>Это пещерное пространство в настоящее время удаляется. Попробуй
          позже."
        cannot-make-island: "<red>Пещера не может быть размещена здесь, извините. Смотрите
          консоль для возможных ошибок."
      unregister:
        description: не зарегистрирован владелец в пещере, но сохранены пещерные блоки
        unregistered-island: "<green>Незарегистрированный игрок из пещеры в [xyz]."
      info:
        description: получить информацию о том, где вы находитесь или пещера игрока
        no-island: "<red>Вы не в пещере сейчас..."
        title: "==========Информация о пещере============"
        islands-in-trash: "<light_purple>Игрок имеет пещеры в мусорном ведре."
        is-spawn: Этот остров является спавном.
      switchto:
        description: переключить пещеру игрока на пронумерованную в мусорном ведре
        out-of-range: "<red>Номер должен быть от 1 до [number]. Используйте <bold>[label]
          мусорки [player] <reset><red>, чтобы увидеть номера пещер"
      trash:
        no-unowned-in-trash: "<red>Не принадлежат пещеры в мусоре"
        no-islands-in-trash: "<red>Игрок не имеет пещер в мусорном ведре"
        description: показать неиспользуемые пещеры или пещеры игрока в мусорном ведре
        title: "<light_purple>===========Пещеры в корзине==========="
        count: "<bold><light_purple>Пещера [number]:"
        use-switch: "<green>Используйте <bold>[label] чтобы поменять на <игрок> <номер> <reset><green>,
          чтобы переключить игрока в пещеру в корзине"
      emptytrash:
        description: Очистить мусор для игрока, или все ненужные пещеры в мусоре
      setrange:
        description: установить диапазон пещеры игрока
        range-updated: Пещерный диапазон обновлен до [number]
      tp:
        description: телепортироваться в пещеру игрока
      getrank:
        description: получить звание игрока в своей пещере
        rank-is: "<green>Ранг - [rank] в этой пещере."
      setrank:
        description: установить ранг игрока в своей пещере
      setspawn:
        description: установить пещеру как спавн для этого мира
        already-spawn: "<red>Эта пещера уже спавн!"
        no-island-here: "<red>Здесь нет пещеры."
        confirmation: "<red>Вы уверены, что хотите установить эту пещеру в качестве спавна
          для этого мира?"
      resetflags:
        description: Сброс всех пещер к настройкам флага по умолчанию в config.yml
      delete:
        description: удаляет пещеру игрока
        cannot-delete-owner: "<red>Все члены пещеры должны быть выгнаны из пещеры перед
          удалением."
        deleted-island: "<green>Остров на <yellow>[xyz] <green>был успешно удален."
    island:
      go:
        description: телепортировать вас в вашу пещеру
        teleport: "<green>Телепортируем вас в вашу пещеру."
      help:
        description: Основная пещерная команда
      create:
        description: создать пещеру, используя необязательный проект (требуется разрешение)
        too-many-islands: "<red>В этом мире слишком много пещер: недостаточно места для
          создания вашей."
        unable-create-island: "<red>Вашу пещеру не удалось создать, обратитесь к администратору."
        creating-island: "<green>Создавается ваша пещера, пожалуйста, подождите..."
        pick: "<red>Выберите пещеру"
      info:
        description: отображать информацию о вашей пещере или пещере игрока
      near:
        description: показать названия соседних пещер вокруг вас
        the-following-islands: "<green>Следующие пещеры находятся поблизости:"
        no-neighbors: "<red>У вас нет ближайших соседних пещер!"
      reset:
        description: перезапустите свою пещеру и удалите старую
        must-remove-members: "<red>Вы должны удалить всех участников из своей пещеры,
          прежде чем сможете ее перезапустить (/ island team kick <player>)."
      sethome:
        must-be-on-your-island: "<red>Вы должны быть в своей пещере, чтобы установить
          дом!"
        home-set: "<gold>Ваш дом в пещере был настроен на ваше текущее местоположение."
      setname:
        description: установить имя для вашей пещеры
      resetname:
        description: сбросить имя пещеры
      team:
        coop:
          description: Добавить игрока в вашу пещеру
        uncoop:
          you-are-no-longer-a-coop-member: "<red>Вы больше не являетесь членом кооператива
            пещеры [name]"
          all-members-logged-off: "<red>Все участники пещеры вышли из системы, так что
            вы больше не являетесь членом кооператива пещеры [name]"
        trust:
          description: дать игроку звание доверенного в вашей пещере
        invite:
          description: пригласить игрока к вашей пещере
          name-has-invited-you: "<green>[name] пригласил вас к его пещере."
          you-will-lose-your-island: "<red>ВНИМАНИЕ! Вы потеряете свою пещеру, если вы
            примете!"
          errors:
            island-is-full: "<red>Ваша пещера заполнена, вы не можете пригласить кого-либо
              еще."
          accept:
            you-joined-island: "<green>Вы присоединились к пещере! Используйте /[label]
              информацию о команде, чтобы увидеть других участников."
            name-joined-your-island: "<green>[name] присоединилось к вашей пещере!"
            confirmation: |-
              <red>Вы уверены, что хотите принять это приглашение?
              <red><bold>Вы будете <underlined>УДАЛЕНЫ <reset><red> с вашей пещеры!
          reject:
            you-rejected-invite: "<green>Вы отклонили приглашение присоединиться к пещере."
            name-rejected-your-invite: "<red>[name] отклонил ваше приглашение в пещеру!"
          cancel:
            description: отменить ожидающее приглашение присоединиться к вашей пещере
        leave:
          description: покинуть свою пещеру
          left-your-island: "<red>[name] вышел с вашей пещеры"
        kick:
          description: удалить члена из вашей пещеры
          owner-kicked: "<red>Владелец выгнал вас из пещеры!"
          success: "<aqua>[name]<green> был изгнан из вашей пещеры."
        demote:
          description: понизить игрока в вашей пещере по рангу
        promote:
          description: повысить игрока в вашей пещере до более высокого звания
        setowner:
          description: передать право собственности на пещеру участнику
          errors:
            target-is-not-member: "<red>Этот игрок не является частью вашей пещерной
              команды!"
          name-is-the-owner: "<green>[name] теперь является владельцем пещеры!"
          you-are-the-owner: "<green>Теперь вы владелец пещеры!"
      ban:
        description: забанить игрока из вашей пещеры
        cannot-ban-more-players: "<red>Вы достигли предела банов, вы не можете забанить
          больше игроков из своей пещеры."
        player-banned: "<aqua>[name]<red> теперь заблокировано в вашей пещере."
        owner-banned-you: "<aqua>[name]<red> забанили вас из своей пещеры!"
        you-are-banned: "<aqua>Вы забанены в этой пещере!"
      unban:
        description: разблокировать игрока из вашей пещеры
        player-unbanned: "<aqua>[name]<green> теперь не заблокирован в вашей пещере."
        you-are-unbanned: "<aqua>[name] <green>не пускай тебя в пещеру"
      banlist:
        noone: "<green>Никто не забанен в этой пещере."
      settings:
        description: настройки отображения пещеры
      expel:
        description: изгнать игрока из вашей пещеры
        not-on-island: "<red>этот игрок не в вашей пещере!"
        player-expelled-you: "<aqua>[name]<red> выгнал тебя из пещеры!"
  ranks:
    owner: Король гномов
    sub-owner: Гном Рыцарь
    member: Гном
    trusted: доверенный
    coop: КО-ОП
    visitor: Человек
    banned: Огр
  protection:
    flags:
      ENDERMAN_GRIEFING:
        description: |-
          <green>Эндермен может удалить
          <green>блоки из пещер
        name: Гриферство эндермена
      ENTER_EXIT_MESSAGES:
        island: пещера [name]
      GEO_LIMIT_MOBS:
        description: |-
          <green>Удалиет мобов, которые уходят
          <green>вне защиты
          <green>в пещеру
        name: "<yellow>Лимит мобов в пещере"
      ISLAND_RESPAWN:
        description: |-
          <green>респаун игрока
          <green>в его пещере
        name: Респавн пещеры
      LIQUIDS_FLOWING_OUT:
        name: Жидкости текут вне пещер
        description: |-
          <green>Включить, могут ли жидкости вытекать наружу
          <green>из диапазона защиты пещеры.
      LOCK:
        description: Включить/Выключить жидкости
        name: Замок пещеры
      NATURAL_SPAWNING_OUTSIDE_RANGE:
        name: Естественное существо появляется вне пределов досягаемости
        description: |-
          <green>Переключить ли существа (животных и
          <green>монстров) могут порождаться естественным путем снаружи
          <green>Диапазон защиты пещеры.

          <red>Отметьте, что это не мешает существам
          <red> порождение через порождения моба или спавна
          <red>яйца.
      OFFLINE_GROWTH:
        description: |-
          <green>Когда выключено, растения
          <green>не будет расти в пещерах
          <green>когда все участники не в сети.
          <green>Может помочь уменьшить отставание.
        name: Оффлайн Рост
      OFFLINE_REDSTONE:
        description: |-
          <green>Когда отключено, Редстоун
          <green>не будет работать в пещерах
          <green>когда все участники не в сети.
          <green>Может помочь уменьшить отставание.
        name: Оффлайн Редстоун
      PISTON_PUSH:
        description: |-
          <green>Разрешить толкать поршни
          <green>и за пределами пещеры
        name: Поршневой толчок
      REMOVE_MOBS:
        description: |-
          <green>Удалить монстров, при
          <green>телепортации в пещеру
        name: Удалить монстров
      TREES_GROWING_OUTSIDE_RANGE:
        name: Деревья, растущие вне диапазона
        description: |-
          <green>Включить, могут ли деревья расти вне
          <green>Диапазона защиты пещеры или нет.
      PREVENT_TELEPORT_WHEN_FALLING:
        name: Предотвратить телепорт при падении
        description: |-
          <green>Предотвращение игроков от <green>телепортации
          <green>снова в свою пещеру, используя команды
          <green>если они падают.
        hint: "<red>Вы не можете телепортироваться обратно в свою пещеру, пока падаете."
    locked: "<red>Эта пещера заперта!"
    protected: "<red>Пещера защищена: [description]"
    spawn-protected: "<red>Спавн защищен: [description]"
    panel:
      PROTECTION:
        description: |-
          <green>настройки защиты
          <green>для этой пещеры
      SETTING:
        description: |-
          <green>Общие настройки
          <green>для этой пещеры
protection:
  flags:
    SKY_WALKER_FLAG:
      description: |-
        <dark_purple><italic>Это позволяет включить / отключить
        <dark_purple><italic>возможность ходить по
        <dark_purple><italic>верхности из пещерного мира
        <dark_purple><italic>без дополнительных разрешений.
      name: Ходящий по небу
      hint: Позволяет ходить по пещерному потолку.
